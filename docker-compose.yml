services:
  db:
    image: postgres:16
    container_name: hotel-db
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
      POSTGRES_DB: hotel
    ports:
      - "5433:5432"
    volumes:
      - hotel_db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hotel-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: xmarek75@vutbr.cz
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  hotel_db_data:
